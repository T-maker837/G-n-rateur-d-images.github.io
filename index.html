<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon IA Image 2026</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 500px; text-align: center; }
        input { width: 90%; padding: 12px; border: none; border-radius: 8px; margin-bottom: 1rem; background: #334155; color: white; font-size: 1rem; }
        button { width: 100%; padding: 12px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0ea5e9; transform: scale(1.02); }
        .result-box { margin-top: 2rem; border: 2px dashed #475569; border-radius: 12px; min-height: 300px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        img { width: 100%; height: auto; display: none; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #38bdf8; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 IA Image Express</h2>
    <p>Génère n'importe quelle image gratuitement.</p>
    
    <input type="text" id="prompt" placeholder="Ex: Un cyber-chat dans l'espace, néon violet...">
    <button onclick="generer()">Créer l'image</button>

    <div class="result-box" id="box">
        <div class="loader" id="loader"></div>
        <img id="output" alt="Image générée">
    </div>
</div>

<script>
    function generer() {
        const text = document.getElementById('prompt').value;
        const img = document.getElementById('output');
        const loader = document.getElementById('loader');

        if (!text) return alert("Écris quelque chose !");

        // Afficher le chargement
        loader.style.display = "block";
        img.style.display = "none";

        // On utilise un seed aléatoire pour avoir une image différente à chaque fois
        const randomSeed = Math.floor(Math.random() * 99999);
        
        // URL de l'API gratuite (Pollinations.ai)
        const url = `https://pollinations.ai/p/${encodeURIComponent(text)}?width=1024&height=1024&seed=${randomSeed}&nologo=true`;

        img.src = url;

        img.onload = () => {
            loader.style.display = "none";
            img.style.display = "block";
        };
        
        img.onerror = () => {
            alert("Erreur lors de la génération. Réessaie !");
            loader.style.display = "none";
        };
    }
</script>

</body>
</html>
